version: "3.8"

services:
  golearn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golearn-api
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
      - DB_PATH=/app/data/golearn.db
      - JWT_SECRET=super-secret-key-golearn-2024
    volumes:
      - golearn-data:/app/data
    restart: unless-stopped

volumes:
  golearn-data:
